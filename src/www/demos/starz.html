<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>starz</title>
  </head>
  <body>
    <main>
      <canvas id="background-canvas">loading...</canvas>
    </main>
  </body>

  <style>
    canvas {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100vw;
      height: 100vh;
      margin: 0;
    }
  </style>

  <script type="module">
    import { initStarz } from '/modules/starz.js';

    addEventListener('load', () => {
      const canvas = document.getElementById('background-canvas');
      console.assert(canvas != null);

      initStarz(canvas);
    });
  </script>
</html>
